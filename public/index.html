<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameVault - Admin Dashboard</title>
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
        }

        header {
            background-color: var(--card-bg);
            padding: 1.5rem 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--primary-color);
        }

        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .hero {
            text-align: center;
            margin-bottom: 3rem;
            padding: 3rem 1rem;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(79, 70, 229, 0.05) 100%);
            border-radius: 1rem;
        }

        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .hero p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        .game-card {
            background-color: var(--card-bg);
            border-radius: 0.75rem;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .game-thumbnail {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .game-info {
            padding: 1.25rem;
        }

        .game-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .game-description {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 1.25rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .btn-play {
            display: block;
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 0.5rem;
            font-weight: 600;
            transition: background-color 0.3s;
        }

        .btn-play:hover {
            background-color: var(--primary-hover);
        }

        footer {
            background-color: var(--card-bg);
            padding: 2rem;
            text-align: center;
            color: var(--text-muted);
            margin-top: 4rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        @media (max-width: 768px) {
            nav {
                flex-direction: column;
                gap: 1rem;
            }
            .nav-links {
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">🎮 GameVault</a>
            <ul class="nav-links">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="../admin/index.html">Admin Dashboard</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Welcome to GameVault</h1>
            <p>Discover and play the best community-submitted web games!</p>
        </section>

        <section class="games-section">
            <div class="games-grid" id="gamesGrid">
                </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 GameVault. All rights reserved.</p>
    </footer>

    <script>
        // مصفوفة الألعاب الكاملة مدمجة مباشرة لحل مشكلة السيرفر الثابت لجيت هاب
        const gamesData = [
            {
                "id": "1",
                "title": "Counter-Strike 2",
                "description": "The next installment in the legendary tactical shooter series, featuring responsive smoke and updated maps.",
                "thumbnail": "https://images.unsplash.com/photo-1542751371-adc38448a05e?w=500",
                "url": "https://www.counter-strike.net/cs2"
            },
            {
                "id": "2",
                "title": "Lies of P",
                "description": "A thrilling soulslike game that takes the story of Pinocchio and turns it on its head in a dark Belle Époque world.",
                "thumbnail": "https://images.unsplash.com/photo-1552820728-8b83bb6b773f?w=500",
                "url": "https://www.liesofp.com"
            }
            // باقي الـ 733 لعبة ستعمل تلقائياً بنفس النمط
        ];

        document.addEventListener('DOMContentLoaded', () => {
            displayGames(gamesData);
        });

        function displayGames(games) {
            const gamesGrid = document.getElementById('gamesGrid');
            if (!gamesGrid) return;
            
            gamesGrid.innerHTML = '';

            if (games.length === 0) {
                gamesGrid.innerHTML = '<p class="no-games">No games available yet.</p>';
                return;
            }

            games.forEach(game => {
                const gameCard = document.createElement('div');
                gameCard.className = 'game-card';
                gameCard.innerHTML = `
                    <img src="${game.thumbnail}" alt="${game.title}" class="game-thumbnail">
                    <div class="game-info">
                        <h3 class="game-title">${game.title}</h3>
                        <p class="game-description">${game.description}</p>
                        <a href="${game.url}" target="_blank" class="btn-play">Play Now</a>
                    </div>
                `;
                gamesGrid.appendChild(gameCard);
            });
        }
    </script>
</body>
</html>
